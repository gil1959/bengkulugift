<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - BengkuluGift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:'#b45309',secondary:'#92400e',accent:'#fef3c7'}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Outfit', sans-serif; }
        .otp-input { width: 52px; height: 60px; font-size: 28px; font-weight: 700; text-align: center; border: 2px solid #e5e7eb; border-radius: 12px; transition: all 0.2s; outline: none; }
        .otp-input:focus { border-color: #b45309; box-shadow: 0 0 0 3px rgba(180,83,9,0.15); }
        .otp-input.filled { border-color: #b45309; background: #fef3c7; color: #b45309; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeInUp 0.5s ease both; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
        .shake { animation: shake 0.4s ease; }
        .step { display: none; }
        .step.active { display: block; }
        .input-field { width:100%; padding:14px 16px; border:2px solid #e5e7eb; border-radius:12px; font-size:15px; transition:all 0.2s; outline:none; }
        .input-field:focus { border-color:#b45309; box-shadow:0 0 0 3px rgba(180,83,9,0.12); }
    </style>
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 via-orange-50 to-amber-100 flex items-center justify-center p-4">

    <div class="w-full max-w-md fade-in">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-primary to-secondary p-8 text-center relative overflow-hidden">
                <div class="absolute inset-0 opacity-10" style="background-image:url('https://www.transparenttextures.com/patterns/cubes.png')"></div>
                <div class="relative z-10">
                    <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                        </svg>
                    </div>
                    <h1 class="font-display font-bold text-2xl text-white mb-1">Lupa Password</h1>
                    <p id="stepDesc" class="text-amber-200 text-sm">Masukkan email Anda untuk mendapatkan kode reset</p>
                </div>
            </div>

            <!-- Step Indicator -->
            <div class="flex items-center justify-center px-8 py-5 border-b border-gray-100">
                <div class="flex items-center gap-2">
                    <div class="step-dot w-8 h-8 rounded-full bg-primary text-white text-sm font-bold flex items-center justify-center" id="dot1">1</div>
                    <div class="w-12 h-1 bg-gray-200 rounded" id="line1"></div>
                    <div class="step-dot w-8 h-8 rounded-full bg-gray-200 text-gray-500 text-sm font-bold flex items-center justify-center" id="dot2">2</div>
                    <div class="w-12 h-1 bg-gray-200 rounded" id="line2"></div>
                    <div class="step-dot w-8 h-8 rounded-full bg-gray-200 text-gray-500 text-sm font-bold flex items-center justify-center" id="dot3">3</div>
                </div>
            </div>

            <div class="p-8">
                <!-- STEP 1: Email -->
                <div id="step1" class="step active">
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Alamat Email</label>
                        <input type="email" id="resetEmail" class="input-field" placeholder="contoh@email.com">
                    </div>
                    <button onclick="sendOTP()" id="sendOTPBtn" class="w-full bg-gradient-to-r from-primary to-secondary text-white font-display font-bold py-4 rounded-2xl hover:opacity-90 transition-all shadow-lg shadow-primary/30 text-lg">
                        Kirim Kode Reset
                    </button>
                </div>

                <!-- STEP 2: OTP Verification -->
                <div id="step2" class="step">
                    <p class="text-gray-500 text-sm text-center mb-6">Kode OTP dikirim ke <span id="emailShow" class="font-semibold text-gray-700"></span></p>
                    <div id="otpContainer" class="flex gap-2 justify-center mb-6">
                        <input type="text" maxlength="1" class="otp-input" id="otp0" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-input" id="otp1" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-input" id="otp2" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-input" id="otp3" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-input" id="otp4" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-input" id="otp5" inputmode="numeric">
                    </div>
                    <button onclick="verifyResetOTP()" class="w-full bg-gradient-to-r from-primary to-secondary text-white font-display font-bold py-4 rounded-2xl hover:opacity-90 transition-all shadow-lg shadow-primary/30 text-lg">
                        Verifikasi Kode
                    </button>
                </div>

                <!-- STEP 3: New Password -->
                <div id="step3" class="step">
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Password Baru</label>
                        <div class="relative">
                            <input type="password" id="newPassword" class="input-field pr-12" placeholder="Minimal 8 karakter">
                            <button type="button" onclick="togglePwd('newPassword','eyeNew')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <svg id="eyeNew" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Konfirmasi Password</label>
                        <div class="relative">
                            <input type="password" id="confirmPassword" class="input-field pr-12" placeholder="Ulangi password baru">
                            <button type="button" onclick="togglePwd('confirmPassword','eyeConf')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <svg id="eyeConf" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                    </div>
                    <button onclick="resetPassword()" class="w-full bg-gradient-to-r from-primary to-secondary text-white font-display font-bold py-4 rounded-2xl hover:opacity-90 transition-all shadow-lg shadow-primary/30 text-lg">
                        Simpan Password Baru
                    </button>
                </div>

                <!-- Back link -->
                <div class="mt-6 pt-6 border-t border-gray-100 text-center">
                    <a href="/pages/auth/login.html" class="text-gray-400 hover:text-gray-600 text-sm transition-colors">← Kembali ke Login</a>
                </div>
            </div>
        </div>

        <div class="text-center mt-6">
            <a href="/" class="text-gray-500 hover:text-primary font-display font-semibold transition-colors">BengkuluGift</a>
        </div>
    </div>

    <script>
        let resetEmail = '';
        let verifiedOTP = '';

        function goToStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
            const descs = ['', 'Masukkan email Anda untuk mendapatkan kode reset', 'Masukkan 6 digit kode OTP dari email Anda', 'Buat password baru yang kuat'];
            document.getElementById('stepDesc').textContent = descs[n];
            // Update dots
            ['dot1','dot2','dot3'].forEach((d,i) => {
                const el = document.getElementById(d);
                if(i+1 < n) { el.className = 'step-dot w-8 h-8 rounded-full bg-green-500 text-white text-sm flex items-center justify-center'; el.innerHTML = '✓'; }
                else if(i+1 === n) { el.className = 'step-dot w-8 h-8 rounded-full bg-primary text-white text-sm font-bold flex items-center justify-center'; el.textContent = i+1; }
                else { el.className = 'step-dot w-8 h-8 rounded-full bg-gray-200 text-gray-500 text-sm font-bold flex items-center justify-center'; el.textContent = i+1; }
            });
            ['line1','line2'].forEach((l,i) => {
                document.getElementById(l).className = `w-12 h-1 rounded ${i+1 < n ? 'bg-primary' : 'bg-gray-200'}`;
            });
        }

        async function sendOTP() {
            resetEmail = document.getElementById('resetEmail').value.trim();
            if (!resetEmail) return Swal.fire({ icon:'warning', title:'Email Kosong', text:'Masukkan alamat email Anda', confirmButtonColor:'#b45309' });
            const btn = document.getElementById('sendOTPBtn');
            btn.disabled = true; btn.textContent = 'Mengirim...';
            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ email: resetEmail })
                });
                const data = await res.json();
                if(res.ok) {
                    document.getElementById('emailShow').textContent = resetEmail;
                    goToStep(2);
                    initOTPInputs();
                } else {
                    Swal.fire({ icon:'error', title:'Gagal', text: data.message, confirmButtonColor:'#b45309' });
                }
            } catch(e) {
                Swal.fire({ icon:'error', title:'Koneksi Gagal', text:'Periksa koneksi internet Anda' });
            } finally {
                btn.disabled = false; btn.textContent = 'Kirim Kode Reset';
            }
        }

        function initOTPInputs() {
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach((input, idx) => {
                input.addEventListener('input', (e) => {
                    const val = e.target.value.replace(/\D/g,'');
                    e.target.value = val;
                    if(val) { e.target.classList.add('filled'); if(idx<5) inputs[idx+1].focus(); }
                    else e.target.classList.remove('filled');
                });
                input.addEventListener('keydown', (e) => {
                    if(e.key==='Backspace' && !input.value && idx>0) { inputs[idx-1].focus(); inputs[idx-1].value=''; inputs[idx-1].classList.remove('filled'); }
                });
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const paste = e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
                    paste.split('').forEach((char,i) => { if(inputs[i]) { inputs[i].value=char; inputs[i].classList.add('filled'); } });
                    if(paste.length===6) inputs[5].focus();
                });
            });
            setTimeout(() => inputs[0].focus(), 100);
        }

        async function verifyResetOTP() {
            const inputs = document.querySelectorAll('.otp-input');
            const otp = Array.from(inputs).map(i=>i.value).join('');
            if(otp.length < 6) {
                document.getElementById('otpContainer').classList.add('shake');
                setTimeout(()=>document.getElementById('otpContainer').classList.remove('shake'),400);
                return Swal.fire({ icon:'warning', title:'OTP Belum Lengkap', text:'Masukkan 6 digit kode OTP', confirmButtonColor:'#b45309' });
            }
            // Just store OTP, actual verification happens on reset
            verifiedOTP = otp;
            goToStep(3);
        }

        async function resetPassword() {
            const newPwd = document.getElementById('newPassword').value;
            const confPwd = document.getElementById('confirmPassword').value;
            if(newPwd.length < 8) return Swal.fire({ icon:'warning', title:'Password Terlalu Pendek', text:'Minimal 8 karakter', confirmButtonColor:'#b45309' });
            if(newPwd !== confPwd) return Swal.fire({ icon:'warning', title:'Password Tidak Cocok', text:'Pastikan password yang Anda masukkan sama', confirmButtonColor:'#b45309' });

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ email: resetEmail, otp: verifiedOTP, new_password: newPwd })
                });
                const data = await res.json();
                if(res.ok) {
                    Swal.fire({
                        icon:'success', title:'Password Berhasil Direset!',
                        text:'Silakan login dengan password baru Anda.',
                        confirmButtonColor:'#b45309', confirmButtonText:'Login Sekarang'
                    }).then(()=>window.location.href='/pages/auth/login.html');
                } else {
                    Swal.fire({ icon:'error', title:'Gagal', text: data.message, confirmButtonColor:'#b45309' });
                }
            } catch(e) {
                Swal.fire({ icon:'error', title:'Koneksi Gagal', text:'Periksa koneksi internet Anda' });
            }
        }

        function togglePwd(id, eyeId) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
