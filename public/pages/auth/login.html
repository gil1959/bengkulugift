<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - BengkuluGift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#b45309', secondary: '#d97706', accent: '#fef3c7' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white rounded-3xl shadow-2xl flex flex-col md:flex-row w-full max-w-4xl overflow-hidden">
        
        <!-- Image Side -->
        <div class="md:w-1/2 bg-primary relative hidden md:block">
            <img src="https://images.unsplash.com/photo-1541592106381-b31e9677c0e5?w=800&auto=format&fit=crop&q=80" alt="Oleh-Oleh Bengkulu" class="w-full h-full object-cover mix-blend-overlay opacity-50">
            <div class="absolute inset-0 flex flex-col justify-center px-12 text-white">
                <h2 class="font-display text-4xl font-bold mb-4">Selamat Datang Kembali!</h2>
                <p class="text-white/80 leading-relaxed">Masuk ke akun Anda untuk mulai berbelanja oleh-oleh khas Bengkulu premium.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="md:w-1/2 p-8 md:p-12 lg:p-16 flex flex-col justify-center">
            <div class="flex items-center gap-2 mb-8 cursor-pointer" onclick="window.location.href='/'">
                <img src="/img/logo.png" alt="BengkuluGift Logo" class="w-10 h-10 object-contain">
                <span class="font-display font-bold text-xl text-primary">BengkuluGift</span>
            </div>

            <h3 class="font-display text-3xl font-bold text-gray-900 mb-2">Masuk Akun</h3>
            <p class="text-gray-500 mb-8">Belum punya akun? <a href="/pages/auth/register.html" class="text-primary font-medium hover:underline">Daftar sekarang</a></p>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Alamat Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="email@contoh.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="••••••••">
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" class="rounded border-gray-300 text-primary focus:ring-primary">
                        <span class="ml-2 text-sm text-gray-600">Ingat saya</span>
                    </label>
                    <a href="/pages/auth/forgot-password.html" class="text-sm text-primary font-medium hover:underline">Lupa Password?</a>
                </div>
                <button type="submit" class="w-full bg-primary text-white font-medium py-3 rounded-xl shadow-lg shadow-primary/30 hover:bg-secondary transform hover:-translate-y-0.5 transition-all">
                    Masuk Sekarang
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('name', data.name);
                    localStorage.setItem('email', email);
                    Swal.fire({
                        icon: 'success',
                        title: 'Login Berhasil!',
                        text: 'Selamat datang kembali.',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = data.role === 'admin' ? '/pages/admin/dashboard.html' : '/pages/user/dashboard.html';
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'Login Gagal', text: data.message || 'Email atau password salah.' });
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Koneksi Gagal', text: 'Terjadi kesalahan jaringan.' });
            }
        });
    </script>
</body>
</html>
