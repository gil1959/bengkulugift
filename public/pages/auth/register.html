<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - BengkuluGift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#b45309', secondary: '#d97706', accent: '#fef3c7' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans py-12">
    <div class="bg-white rounded-3xl shadow-2xl flex flex-col md:flex-row-reverse w-full max-w-4xl overflow-hidden">
        
        <!-- Image Side -->
        <div class="md:w-1/2 bg-primary relative hidden md:block">
            <img src="https://images.unsplash.com/photo-1541592106381-b31e9677c0e5?w=800&auto=format&fit=crop&q=80" alt="Kopi Bengkulu" class="w-full h-full object-cover mix-blend-overlay opacity-50">
            <div class="absolute inset-0 flex flex-col justify-center px-12 text-white text-right">
                <h2 class="font-display text-4xl font-bold mb-4">Bergabung Bersama Kami!</h2>
                <p class="text-white/80 leading-relaxed ml-auto">Dapatkan penawaran terbaik dan produk otentik langsung dari pengrajin Bengkulu.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
            <div class="flex items-center gap-2 mb-8 cursor-pointer" onclick="window.location.href='/'">
                <img src="/img/logo.png" alt="BengkuluGift Logo" class="w-10 h-10 object-contain">
                <span class="font-display font-bold text-xl text-primary">BengkuluGift</span>
            </div>

            <h3 class="font-display text-3xl font-bold text-gray-900 mb-2">Buat Akun Baru</h3>
            <p class="text-gray-500 mb-8">Sudah punya akun? <a href="/pages/auth/login.html" class="text-primary font-medium hover:underline">Masuk di sini</a></p>

            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                    <input type="text" id="name" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="Nama Anda">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Alamat Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="email@contoh.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nomor HP / WhatsApp</label>
                    <input type="tel" id="no_hp" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="08xxxxxxxxxx">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" required minlength="6" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="Minimal 6 karakter">
                </div>
                
                <button type="submit" class="w-full bg-primary text-white font-medium py-3 rounded-xl shadow-lg shadow-primary/30 hover:bg-secondary transform hover:-translate-y-0.5 transition-all mt-4">
                    Daftar Sekarang
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = "Memproses...";
            btn.disabled = true;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const no_hp = document.getElementById('no_hp').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, no_hp })
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('pendingEmail', email);
                    Swal.fire({
                        icon: 'success',
                        title: 'OTP Terkirim!',
                        text: `Kode verifikasi telah dikirim ke ${email}. Segera cek inbox Anda.`,
                        confirmButtonColor: '#b45309',
                        confirmButtonText: 'Verifikasi Sekarang'
                    }).then(() => {
                        window.location.href = `/pages/auth/verify-email.html?email=${encodeURIComponent(email)}`;
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'Registrasi Gagal', text: data.message || 'Data tidak valid' });
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Koneksi Gagal', text: 'Terjadi kesalahan jaringan' });
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
