<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Produk - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#b45309' } } }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen overflow-hidden relative">
        <!-- Sidebar -->
        <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-gray-900 text-white flex flex-col flex-shrink-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="p-5 flex items-center gap-3 border-b border-gray-800">
                <img src="/img/logo.png" alt="BengkuluGift Logo" class="w-10 h-10 object-contain">
                <div>
                    <span class="font-bold text-lg">BengkuluGift</span>
                    <p class="text-xs text-gray-400">Admin Panel</p>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <a href="/pages/admin/dashboard.html" class="flex items-center gap-3 py-2.5 px-4 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="/pages/admin/" class="flex items-center gap-3 py-2.5 px-4 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <span>Kelola Pesanan</span>
                </a>
                <a href="/pages/admin/products.html" class="flex items-center gap-3 py-2.5 px-4 rounded-xl bg-primary/20 text-primary font-medium">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                    <span>Kelola Produk</span>
                </a>
                <a href="/pages/admin/categories.html" class="flex items-center gap-3 py-2.5 px-4 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                    <span>Kelola Kategori</span>
                </a>
                <a href="/pages/admin/users.html" class="flex items-center gap-3 py-2.5 px-4 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <span>Kelola Pengguna</span>
                </a>
                <a href="/pages/admin/reviews.html" class="flex items-center gap-3 py-2.5 px-4 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
                    <span>Kelola Ulasan</span>
                </a>
            </nav>
            <div class="p-4 border-t border-gray-800">
                <button onclick="logout()" class="w-full flex items-center gap-2 py-2 px-4 text-red-400 hover:bg-gray-800 rounded-lg transition-colors text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Keluar
                </button>
            </div>
        </div>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleSidebar()"></div>
    <div class="flex-1 overflow-y-auto md:ml-64">
        <div class="bg-white border-b px-4 md:px-8 py-4 flex items-center gap-3 sticky top-0 z-10">
            <button class="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors flex-shrink-0" onclick="toggleSidebar()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <h1 class="font-bold text-xl md:text-2xl text-gray-800 flex-1">Kelola Produk</h1>
            <a href="/" target="_blank" class="text-sm text-primary font-medium hidden md:block">Lihat Toko ?</a>
        </div>
        <div class="p-4 md:p-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-8">Kelola Produk</h1>

            <div class="bg-white rounded-xl shadow p-6 mb-8">
                <h2 class="text-xl font-bold mb-4 border-b pb-2" id="formTitle">Tambah Produk Baru</h2>
                <form id="productForm" class="space-y-4">
                    <input type="hidden" id="productId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Produk</label>
                            <input type="text" id="name" required class="w-full border p-2 rounded focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
                            <select id="category_id" required class="w-full border p-2 rounded focus:ring-primary focus:border-primary">
                                <option value="">Pilih Kategori...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Harga (Rp)</label>
                            <input type="number" id="price" required class="w-full border p-2 rounded focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Stok</label>
                            <input type="number" id="stock" required class="w-full border p-2 rounded focus:ring-primary focus:border-primary">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Deskripsi</label>
                        <textarea id="description" rows="3" class="w-full border p-2 rounded focus:ring-primary focus:border-primary"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Gambar Produk</label>
                        <input type="file" id="image" accept="image/*" class="w-full border p-2 rounded focus:ring-primary focus:border-primary">
                        <p class="text-xs text-gray-500 mt-1" id="imageHelp">Pilih gambar untuk mengganti (jika edit).</p>
                    </div>
                    <div class="flex gap-2 pt-2 border-t">
                        <button type="submit" class="bg-primary text-white px-6 py-2 rounded hover:bg-amber-800" id="btnSubmit">Simpan</button>
                        <button type="button" onclick="resetForm()" class="bg-gray-300 text-gray-700 px-4 py-2 rounded hidden" id="btnCancel">Batal</button>
                    </div>
                </form>
            </div>

            <div class="bg-white rounded-xl shadow p-6">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm">
                                <th class="p-3 border-b">ID</th>
                                <th class="p-3 border-b">Gambar</th>
                                <th class="p-3 border-b">Nama Produk</th>
                                <th class="p-3 border-b">Harga</th>
                                <th class="p-3 border-b">Stok</th>
                                <th class="p-3 border-b text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="6" class="p-4 text-center text-gray-500">Memuat...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('role') !== 'admin') {
            window.location.href = '/';
        }

        const API_URL = '/api';
        const token = localStorage.getItem('token');
        let productsData = [];

        async function loadCategories() {
            try {
                const res = await fetch(API_URL + '/categories');
                const categories = await res.json();
                const select = document.getElementById('category_id');
                categories.forEach(c => {
                    select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                });
            } catch(e) {}
        }

        async function loadProducts() {
            try {
                const res = await fetch(API_URL + '/products');
                productsData = await res.json();
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                if(productsData.length === 0) tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center">Belum ada produk</td></tr>';
                productsData.forEach(p => {
                    const img = p.image ? `<img src="${p.image}" class="w-14 h-14 object-cover rounded-lg shadow">` : `<div class="w-14 h-14 bg-gray-100 rounded-lg flex items-center justify-center"><svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div>`;
                    const price = parseFloat(p.price).toLocaleString('id-ID');
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-3 text-gray-500">${p.id}</td>
                            <td class="p-3">${img}</td>
                            <td class="p-3">
                                <p class="font-medium text-gray-900">${p.name}</p>
                                <p class="text-xs text-gray-400">${p.category_name || 'Tanpa Kategori'}</p>
                            </td>
                            <td class="p-3 font-semibold text-primary">Rp ${price}</td>
                            <td class="p-3">
                                <span class="px-2 py-1 rounded text-xs font-bold ${p.stock < 5 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${p.stock}</span>
                            </td>
                            <td class="p-3 text-right">
                                <button onclick="editProduct(${p.id})" class="text-blue-500 hover:text-blue-700 mr-3">Edit</button>
                                <button onclick="deleteProduct(${p.id})" class="text-red-500 hover:text-red-700">Hapus</button>
                            </td>
                        </tr>
                    `;
                });
            } catch(e) {
                Swal.fire('Error', 'Gagal memuat produk', 'error');
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('category_id', document.getElementById('category_id').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('stock', document.getElementById('stock').value);
            formData.append('description', document.getElementById('description').value);
            
            const imageFile = document.getElementById('image').files[0];
            if(imageFile) {
                formData.append('image', imageFile);
            }

            try {
                let res;
                if(id) {
                    res = await fetch(API_URL + '/products/' + id, { 
                        method: 'PUT', 
                        headers: { 'Authorization': 'Bearer ' + token }, 
                        body: formData 
                    });
                } else {
                    res = await fetch(API_URL + '/products', { 
                        method: 'POST', 
                        headers: { 'Authorization': 'Bearer ' + token }, 
                        body: formData 
                    });
                }
                
                if(res.ok) {
                    Swal.fire('Berhasil', 'Produk tersimpan', 'success');
                    resetForm();
                    loadProducts();
                } else {
                    const data = await res.json();
                    Swal.fire('Gagal', data.message || 'Gagal menyimpan', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Kesalahan jaringan', 'error');
            }
        });

        function editProduct(id) {
            const product = productsData.find(p => p.id === id);
            if(!product) return;
            
            document.getElementById('productId').value = product.id;
            document.getElementById('name').value = product.name;
            document.getElementById('category_id').value = product.category_id;
            document.getElementById('price').value = product.price;
            document.getElementById('stock').value = product.stock;
            document.getElementById('description').value = product.description || '';
            document.getElementById('image').value = ''; // Reset file input
            
            document.getElementById('formTitle').textContent = 'Edit Produk';
            document.getElementById('btnSubmit').textContent = 'Update';
            document.getElementById('btnCancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('productId').value = '';
            document.getElementById('productForm').reset();
            document.getElementById('formTitle').textContent = 'Tambah Produk Baru';
            document.getElementById('btnSubmit').textContent = 'Simpan';
            document.getElementById('btnCancel').classList.add('hidden');
        }

        async function deleteProduct(id) {
            Swal.fire({
                title: 'Hapus Produk?',
                text: "Produk akan dihapus selamanya!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Ya, Hapus!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const res = await fetch(API_URL + `/products/${id}`, { 
                        method: 'DELETE', 
                        headers: { 'Authorization': 'Bearer ' + token } 
                    });
                    if(res.ok) {
                        Swal.fire('Terhapus!', 'Produk telah dihapus.', 'success');
                        loadProducts();
                    } else {
                        Swal.fire('Gagal', 'Tidak dapat menghapus produk', 'error');
                    }
                }
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/pages/auth/login.html';
        }

        loadCategories();
        loadProducts();
    </script>




<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (!sidebar || !overlay) return;
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
    }
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('#sidebar nav a').forEach(el => {
            el.addEventListener('click', () => { if (window.innerWidth < 768) toggleSidebar(); });
        });
    });
</script>
</body>
</html>
