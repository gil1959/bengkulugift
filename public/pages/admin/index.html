<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validasi Pembayaran - Admin BengkuluGift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:'#b45309',secondary:'#92400e'}}}}</script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>.font-display{font-family:'Outfit',sans-serif;}</style>
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body class="bg-gray-100 min-h-screen">
<div class="flex h-screen overflow-hidden relative">

    <!-- Sidebar -->
    <div class="fixed inset-y-0 left-0 z-50 w-64 bg-gray-900 text-white flex flex-col flex-shrink-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out" id="sidebar">
        <div class="p-5 flex items-center gap-3 border-b border-gray-800">
            <img src="/img/logo.png" alt="BengkuluGift Logo" class="w-10 h-10 object-contain">
            <div>
                <span class="font-display font-bold text-lg">BengkuluGift</span>
                <p class="text-xs text-gray-400">Admin Panel</p>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="/pages/admin/dashboard.html" class="flex items-center gap-3 py-2.5 px-4 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Dashboard
            </a>
            <a href="/pages/admin/" class="flex items-center gap-3 py-2.5 px-4 rounded-xl bg-primary/20 text-primary font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Validasi Pembayaran
            </a>
            <a href="/pages/admin/products.html" class="flex items-center gap-3 py-2.5 px-4 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                Kelola Produk
            </a>
            <a href="/pages/admin/categories.html" class="flex items-center gap-3 py-2.5 px-4 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                Kelola Kategori
            </a>
            <a href="/pages/admin/users.html" class="flex items-center gap-3 py-2.5 px-4 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                Kelola Pengguna
            </a>
            <a href="/pages/admin/reviews.html" class="flex items-center gap-3 py-2.5 px-4 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
                Kelola Ulasan
            </a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="logout()" class="w-full flex items-center gap-2 py-2 px-4 text-red-400 hover:bg-gray-800 rounded-lg transition-colors text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Keluar
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleSidebar()"></div>
    <div class="flex-1 overflow-y-auto md:ml-64">
        <!-- Top Bar -->
        <div class="bg-white border-b px-4 md:px-8 py-4 flex items-center gap-3 justify-between sticky top-0 z-10">
        <button class="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors flex-shrink-0" onclick="toggleSidebar()">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div>
                <h1 class="font-display font-bold text-2xl text-gray-800">Validasi Pembayaran</h1>
                <p class="text-sm text-gray-500">Pesanan yang menunggu verifikasi bukti bayar</p>
            </div>
            <button onclick="loadAdminData()" class="flex items-center gap-2 text-sm text-gray-600 hover:text-primary px-3 py-2 rounded-lg hover:bg-gray-100 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                Refresh
            </button>
        </div>

        <div class="p-4 md:p-8">
            <!-- Filter Tabs -->
            <div class="flex gap-2 mb-6">
                <button onclick="filterOrders('paid')" id="tab-paid" class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-100 text-blue-700 border border-blue-200">Menunggu Validasi</button>
                <button onclick="filterOrders('all')" id="tab-all" class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 border border-gray-200 hover:bg-gray-200">Semua Pesanan</button>
            </div>

            <div class="bg-white rounded-2xl shadow">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b">
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase">ID</th>
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase">Pelanggan</th>
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase">Produk</th>
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase">Total</th>
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase">Status</th>
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase">Bukti Bayar</th>
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase">Tanggal</th>
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <tr><td colspan="8" class="p-8 text-center text-gray-400">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    if (localStorage.getItem('role') !== 'admin') {
        Swal.fire({ icon: 'error', title: 'Akses Ditolak', text: 'Anda bukan admin.' }).then(() => window.location.href = '/');
    }

    const API_URL = '/api';
    const token = localStorage.getItem('token');
    const headers = { 
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
    };
    let allOrders = [];
    let currentFilter = 'paid';

    async function loadAdminData() {
        try {
            const res = await fetch(API_URL + '/orders/all', { headers });
            allOrders = await res.json();
            renderOrders(currentFilter);
        } catch(e) {
            document.getElementById('ordersTableBody').innerHTML = '<tr><td colspan="8" class="p-8 text-center text-red-400">Gagal memuat data. Pastikan Anda login sebagai admin.</td></tr>';
        }
    }

    function filterOrders(filter) {
        currentFilter = filter;
        ['paid', 'all'].forEach(f => {
            const btn = document.getElementById('tab-' + f);
            btn.className = f === filter
                ? 'px-4 py-2 rounded-lg text-sm font-medium bg-blue-100 text-blue-700 border border-blue-200'
                : 'px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 border border-gray-200 hover:bg-gray-200';
        });
        renderOrders(filter);
    }

    function renderOrders(filter) {
        const orders = filter === 'paid' ? allOrders.filter(o => o.status === 'paid') : allOrders;
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = '';

        if (orders.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="p-12 text-center text-gray-400">
                <svg class="w-12 h-12 mx-auto mb-3 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                ${filter === 'paid' ? 'Tidak ada pesanan yang menunggu validasi' : 'Belum ada pesanan masuk'}
            </td></tr>`;
            return;
        }

        const statusMap = {
            pending:   { label: 'Pending',      cls: 'bg-yellow-100 text-yellow-700' },
            paid:      { label: 'Menunggu Cek',  cls: 'bg-blue-100 text-blue-700' },
            diproses:  { label: 'Diproses',      cls: 'bg-orange-100 text-orange-700' },
            dikirim:   { label: 'Dikirim',       cls: 'bg-purple-100 text-purple-700' },
            selesai:   { label: 'Selesai',       cls: 'bg-green-100 text-green-700' },
            cancelled: { label: 'Dibatalkan',    cls: 'bg-red-100 text-red-700' }
        };

        orders.forEach(o => {
            const st = statusMap[o.status] || { label: o.status, cls: 'bg-gray-100 text-gray-700' };
            const date = new Date(o.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            const total = parseFloat(o.total_amount).toLocaleString('id-ID');
            const items = o.items_summary || '-';

            let actions = '<span class="text-xs text-gray-400">-</span>';
            if (o.status === 'paid') {
                actions = `<div class="flex gap-2 justify-end">
                     <button onclick="validateOrder(${o.id})" class="text-xs px-3 py-1.5 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors font-medium">✓ Validasi</button>
                     <button onclick="cancelOrder(${o.id})" class="text-xs px-3 py-1.5 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition-colors">Tolak</button>
                   </div>`;
            } else if (o.status === 'diproses') {
                actions = `<div class="flex gap-2 justify-end">
                     <button onclick="sendOrder(${o.id})" class="text-xs px-3 py-1.5 bg-purple-500 text-white rounded-lg hover:bg-purple-600 transition-colors font-medium shadow-sm flex items-center gap-1">
                         <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                         Kirim Pesanan
                     </button>
                   </div>`;
            }

            const proof = o.payment_proof
                ? `<a href="${o.payment_proof}" target="_blank" class="flex items-center gap-1 text-blue-500 hover:text-blue-700 text-xs font-medium">
                     <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                     Lihat
                   </a>`
                : `<span class="text-xs text-gray-400">Belum upload</span>`;

            tbody.innerHTML += `
                <tr class="border-b hover:bg-gray-50 transition-colors">
                    <td class="p-4 text-sm text-gray-500 font-mono">#${o.id}</td>
                    <td class="p-4">
                        <p class="font-medium text-gray-800 text-sm">${o.user_name || '-'}</p>
                        <p class="text-xs text-gray-400">${o.user_email || ''}</p>
                    </td>
                    <td class="p-4 text-xs text-gray-500 max-w-32 truncate" title="${items}">${items}</td>
                    <td class="p-4 font-semibold text-gray-800">Rp ${total}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded-full text-xs font-bold ${st.cls}">${st.label}</span></td>
                    <td class="p-4">${proof}</td>
                    <td class="p-4 text-xs text-gray-500">${date}</td>
                    <td class="p-4">${actions}</td>
                </tr>`;
        });
    }

    async function validateOrder(id) {
        const { isConfirmed } = await Swal.fire({
            title: 'Validasi Pembayaran?',
            html: `<p class="text-gray-600">Pastikan bukti bayar sudah <strong>sesuai</strong> sebelum memvalidasi.</p>`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#22c55e',
            cancelButtonColor: '#6b7280',
            confirmButtonText: '✓ Ya, Validasi!',
            cancelButtonText: 'Batal'
        });
        if (!isConfirmed) return;
        try {
            const res = await fetch(`${API_URL}/orders/${id}/validate`, { 
                method: 'PUT', 
                headers 
            });
            const data = await res.json();
            if (res.ok) {
                await Swal.fire({ icon: 'success', title: 'Tervalidasi!', text: 'Pesanan berhasil divalidasi dan sedang diproses.', timer: 2000, showConfirmButton: false });
                loadAdminData();
            } else {
                Swal.fire({ icon: 'error', title: 'Gagal!', text: data.message || data.error || 'Terjadi kesalahan saat validasi.' });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Koneksi Error', text: 'Gagal terhubung ke server. Coba lagi.' });
        }
    }

    async function cancelOrder(id) {
        const { isConfirmed } = await Swal.fire({
            title: 'Tolak Pesanan?',
            text: 'Pesanan ini akan ditandai sebagai dibatalkan.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Ya, Tolak',
            cancelButtonText: 'Batal'
        });
        if (!isConfirmed) return;
        try {
            const res = await fetch(`${API_URL}/orders/${id}/cancel`, { 
                method: 'PUT', 
                headers 
            });
            const data = await res.json();
            if (res.ok) {
                await Swal.fire({ icon: 'info', title: 'Ditolak', text: 'Pesanan telah dibatalkan.', timer: 1800, showConfirmButton: false });
                loadAdminData();
            } else {
                Swal.fire({ icon: 'error', title: 'Gagal!', text: data.message || data.error || 'Terjadi kesalahan.' });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Koneksi Error', text: 'Gagal terhubung ke server. Coba lagi.' });
        }
    }

    async function sendOrder(id) {
        const { isConfirmed } = await Swal.fire({
            title: 'Kirim Pesanan?',
            text: 'Tandai pesanan ini sebagai sedang dikirim.',
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#a855f7',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Ya, Kirim',
            cancelButtonText: 'Batal'
        });
        if (!isConfirmed) return;
        try {
            const res = await fetch(`${API_URL}/orders/${id}/send`, { 
                method: 'PUT', 
                headers 
            });
            const data = await res.json();
            if (res.ok) {
                await Swal.fire({ icon: 'success', title: 'Dikirim!', text: 'Status pesanan berubah menjadi dikirim.', timer: 1800, showConfirmButton: false });
                loadAdminData();
            } else {
                Swal.fire({ icon: 'error', title: 'Gagal!', text: data.message || data.error || 'Terjadi kesalahan.' });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Koneksi Error', text: 'Gagal terhubung ke server. Coba lagi.' });
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/pages/auth/login.html';
    }

    loadAdminData();
</script>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (!sidebar || !overlay) return;
        const isOpen = !sidebar.classList.contains('-translate-x-full');
        if (isOpen) {
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
        } else {
            sidebar.classList.remove('-translate-x-full');
            overlay.classList.remove('hidden');
        }
    }
    // Tutup sidebar jika klik nav item di mobile
    document.querySelectorAll('#sidebar nav a, #sidebar nav button').forEach(el => {
        el.addEventListener('click', () => {
            if (window.innerWidth < 768) toggleSidebar();
        });
    });
</script>
</body>
</html>
